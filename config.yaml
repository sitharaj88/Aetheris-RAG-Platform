# Veridia RAG Configuration
# Override any setting via environment variables or .env file

embedding:
  provider: "sentence_transformers"   # sentence_transformers | qwen3 | openai
  model_name: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 64
  normalize: true
  # --- Qwen3-Embedding upgrade (set provider: qwen3 + re-index) ---
  # provider: "qwen3"
  # model_name: "Qwen/Qwen3-Embedding-0.6B"   # 0.6B (1024d) | 4B (2560d) | 8B (4096d)
  # backend: "sentence_transformers"          # or "ollama" for GGUF
  # truncate_dim: 1024                          # Matryoshka: cap storage/latency
  # max_seq_length: 8192                        # Qwen3 supports up to 32K
  # host: "http://127.0.0.1:11434"            # used when backend: ollama

chunking:
  strategy: "contextual"          # fixed, recursive, semantic, markdown, contextual
  chunk_size: 512
  chunk_overlap: 50
  semantic_threshold: 0.5        # for semantic chunking

retrieval:
  top_k: 10
  similarity_threshold: 0.3
  dense_weight: 0.6
  sparse_weight: 0.4
  rrf_k: 60                     # RRF constant

reranking:
  enabled: true
  provider: "cross_encoder"   # cross_encoder | qwen3
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5
  # --- Qwen3-Reranker upgrade (no re-index required) ---
  # provider: "qwen3"
  # model_name: "Qwen/Qwen3-Reranker-0.6B"   # 0.6B | 4B | 8B

generation:
  provider: "ollama"          # ollama | litellm
  ollama_host: "http://127.0.0.1:11434"
  model: "qwen2.5:3b"
  temperature: 0.1
  max_tokens: 2048
  stream: true
  # --- LiteLLM backend (local Ollama + cloud through one interface) ---
  # provider: "litellm"
  # litellm_model: "ollama/qwen2.5:3b"        # or "openai/gpt-4o-mini", "anthropic/claude-sonnet-4-6"
  # api_key: null                              # cloud key (or via env, e.g. OPENAI_API_KEY)
  # api_base: null

vectorstore:
  persist_dir: "./data/chromadb"
  collection_name: "default_collection"

logging:
  level: "INFO"
  file: "logs/veridia.log"
  rotation: "10 MB"
  retention: "7 days"

ingestion:
  supported_extensions:
    - ".pdf"
    - ".docx"
    - ".md"
    - ".txt"
    - ".py"
    - ".js"
    - ".ts"
    - ".java"
    - ".c"
    - ".cpp"
    - ".go"
    - ".rs"
    - ".html"
    - ".css"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
  max_file_size_mb: 50
  pdf_parser: "pymupdf"        # pymupdf | mineru (external MinerU2.5 service)
  # mineru_url: "http://127.0.0.1:8001"

# --- Observability / tracing (Langfuse, self-hosted) ---
observability:
  enabled: false
  provider: "langfuse"
  host: "http://localhost:3000"
  public_key: null
  secret_key: null

# --- Semantic answer cache ---
cache:
  enabled: false
  similarity_threshold: 0.95
  collection_name: "_semantic_cache"
  max_entries: 1000

# --- Prompt-injection / data-leak guards ---
security:
  enabled: false
  scan_input: true
  scan_output: true
  block_on_detection: false
